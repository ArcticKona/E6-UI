<!--		<link rel="stylesheet" href="https://assets.kona.cf/kona.min.css" crossorigin="anonymous">-->

		<script>
			const url = 'https://api.e6.kona.cf/v1';
			$(document).ready(function(){
				$('#idk').html('	');
				$('#answers').hide();
				$('#search').submit(function(self){
					var username = $('#username').val();
					var token = '';
					var add = '';
					$('#idk').html('	');
					$('html, body').animate({scrollTop: 0}, 1000, function(){
						$('#answers').hide();

						// Query server
						$.post(url,{
							username:username,
						},null,'html').done(function(data){
							if(data=="I don't know this username"){
								$('#idk').html("Oh no! I don't know that user.");
							} else {
								// Okie~ add data
								for(i=1;i<data.split('</p><p>').length;i++){
									add+=('<div class="col-12 col-md-6 mx-auto my-1 p-4	rounded text-dark text-center" style="background: rgba( 255 , 255 , 255 , 0.9 );"><h4 class="mb-0">'+data.split('</p><p>')[i].split('</p>')[0]+'</h4></div><div class="w-100"></div>');
								}
								$('#answers').html(add);
								$('#answers').show();
								$('html, body').animate({scrollTop: $("#answers").offset().top}, 1000);
							}
						}).fail(function(){
							$('#idk').html("ERROR: Server Did Not Respond");
						});
					});
				});
			});

		</script>

						Front-end by <a href="https://arcticjieer.fam.cx/">Arctic Kona</a>. Back-end by <a href="https://reddit.com/u/shitty_markov_chain">u/shitty_markov_chain</a>.
					</p>

						You enter your e621 username, and it picks a list of users with similar favorites, best match first. This will even gives you a link to search for their favorites!

						!!! JAVASCRIPT ERROR !!!
					</p>

			<!-- Results Box -->
